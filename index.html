<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Null Routes</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Fraunces', 'serif'],
                        sans: ['Inter', 'ui-sans-serif', 'system-ui']
                    }
                }
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-white text-black dark:bg-black dark:text-white min-h-screen flex flex-col transition-colors duration-200">

    <!-- Nav Header -->
    <header class="border-b border-black/10 dark:border-white/10 sticky top-0 bg-white/80 dark:bg-black/80 backdrop-blur-md z-50">
        <div class="max-w-3xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="#home" class="font-bold tracking-tight">Null Routes</a>
            
            <!-- Dynamic Navigation and Theme Toggle wrapper -->
            <div class="flex items-center gap-6">
                <nav id="nav-menu" class="flex items-center gap-6">
                    <!-- JavaScript populates links and hover dropdowns here -->
                </nav>
                <button id="theme-toggle" class="text-sm p-1 border border-black/20 dark:border-white/20 rounded hover:bg-black/5 dark:hover:bg-white/5 transition-colors" aria-label="Toggle Theme">◐</button>
            </div>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="flex-grow max-w-3xl w-full mx-auto px-6 py-12">
        <article id="content" class="prose dark:prose-invert max-w-none prose-headings:font-bold prose-headings:tracking-tight prose-a:underline hover:prose-a:opacity-70 prose-img:rounded-lg">
            <p class="text-neutral-400">Loading content...</p>
        </article>
    </main>

    <!-- Footer -->
    <footer class="border-t border-black/10 dark:border-white/10 py-6">
        <div class="max-w-3xl mx-auto px-6 flex justify-between items-center text-xs text-neutral-500 dark:text-neutral-400">
            <p>&copy; 2026 Null Routes</p>
            <p><a href="https://github.com/Null-Routes/Null-Routes.github.io">View the Source Code</a></p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
